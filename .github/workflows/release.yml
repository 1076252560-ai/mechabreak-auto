name: Build Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python -m PyInstaller --onefile --windowed --uac-admin --name="MechaBreakAuto-${{ github.ref_name }}" --add-data="templates;templates" main.py

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/MechaBreakAuto-${{ github.ref_name }}.exe
          name: "解限机路网补给助手 ${{ github.ref_name }}"
          body: |
            ## 更新内容

            ### ⚠ 重大变更
            - 检测方式从模板匹配更换为 ONNX 文字识别（RapidOCR PP-OCRv4）
            - 投影分行 + 固定 ROI 裁切，名字全部正确，价格识别基本可用
            - 速度 41ms/卡（216 张实测截图验证）

            ### GUI
            - 配置区域：参考图 → 预览确认 → 3×2 网格
            - 使用指南弹窗（GIF 动画，启动自动弹出）
            - 窗口居中，紧凑日志

            ## 使用

            1. 下载 MechaBreakAuto-${{ github.ref_name }}.exe
            2. 打开游戏路网补给页面
            3. 运行 EXE → 配置区域（卡片+刷新按钮）→ 勾选武装 → 开始

            ## 功能

            - 模板匹配识别武装和已售状态
            - 紫色检测 IV 级武装
            - 全选 / IV 级模式 / 按名称三种筛选模式
            - F8 全局停止
            - 启动自动管理员提权
