name: Build Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python -m PyInstaller --onefile --windowed --uac-admin --name="MechaBreakAuto-${{ github.ref_name }}" --add-data="templates;templates" main.py

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/MechaBreakAuto-${{ github.ref_name }}.exe
          name: "解限机路网补给助手 ${{ github.ref_name }}"
          body: |
            ## 更新内容

            - IV 级选择改为 3 个互斥模式：购买所有 / 仅购买勾选武装 / 不购买
            - 武装选择 (I/II/III 级) 与 IV 级选择分开为两个区域
            - 修复 IV 级"仅购买勾选武装"模式下 1/2/3 级卡片被错误跳过
            - IV 级判断优先于 1/2/3 级

            ## 使用

            1. 下载 MechaBreakAuto-${{ github.ref_name }}.exe
            2. 打开游戏路网补给页面
            3. 运行 EXE → 配置区域（卡片+刷新按钮）→ 勾选武装 → 开始

            ## 功能

            - 模板匹配识别武装和已售状态
            - 紫色检测 IV 级武装
            - 全选 / IV 级模式 / 按名称三种筛选模式
            - F8 全局停止
            - 启动自动管理员提权
